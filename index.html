<!doctype html>
<html lang="en">

<head>
       <!-- META -->
       <meta charset="UTF-8" />
       <meta name="viewport" content="width=device-width, initial-scale=1" />

       <title>Suman Jhanp | Full Stack Developer & Data Analyst</title>

       <meta name="description"
              content="Suman Jhanp – Full Stack Developer & Data Analyst. Portfolio showcasing MERN projects, skills, and contact details." />

       <!-- Ocean theme color for mobile browser chrome -->
       <meta name="theme-color" content="#020c1b" />

       <!-- Open Graph (looks good when shared on social) -->
       <meta property="og:title" content="Suman Jhanp | Full Stack Developer" />
       <meta property="og:description" content="MERN Developer & Data Analyst — building scalable web apps." />
       <meta property="og:type" content="website" />

       <!-- FAVICON -->
       <link rel="icon" href="/favicon.svg" />

       <!-- GOOGLE FONTS — Syne (display) + DM Sans (body) -->
       <link rel="preconnect" href="https://fonts.googleapis.com" />
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
       <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
              rel="stylesheet" />

       <style>
              /* Apply fonts globally before React mounts — prevents FOUT */
              *,
              *::before,
              *::after {
                     box-sizing: border-box;
              }

              html {
                     font-family: 'DM Sans', system-ui, sans-serif;
              }

              h1,
              h2,
              h3,
              h4,
              h5,
              h6 {
                     font-family: 'Syne', sans-serif;
              }

              /* Initial page background matches ocean theme so no white flash */
              body {
                     margin: 0;
                     background-color: #020c1b;
                     color: #e0f2fe;
              }

              /* Minimal loading state while React hydrates */
              #root:empty::after {
                     content: "";
                     display: block;
                     width: 40px;
                     height: 40px;
                     margin: 48vh auto 0;
                     border-radius: 50%;
                     border: 3px solid rgba(14, 165, 233, 0.15);
                     border-top-color: #0ea5e9;
                     animation: spin 0.7s linear infinite;
              }

              @keyframes spin {
                     to {
                            transform: rotate(360deg);
                     }
              }
       </style>
</head>

<body>
       <div id="root"></div>
       <script type="module" src="/src/main.jsx"></script>
</body>

</html>
